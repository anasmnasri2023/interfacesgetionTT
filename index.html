<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>STUDIAAFRIQUE — Connexion & Inscription</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --admin: #FF6B35;
    --rh: #4ECDC4;
    --manager: #45B7D1;
    --employe: #96CEB4;
    --bg: #F5F7FC;
    --bg-light: #FFFFFF;
    --card: #FFFFFF;
    --border: rgba(0, 0, 0, 0.08);
    --text: #1a1d2e;
    --text-muted: #6c6f8a;
    --input-bg: #F8F9FD;
    --shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow-y: auto;
  }

  /* fond animé clair */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,107,53,.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, rgba(78,205,196,.06) 0%, transparent 60%);
    animation: bgPulse 8s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes bgPulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
  }

  .grid-overlay {
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(0,0,0,.02) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,0,0,.02) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .wrapper {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    animation: fadeUp .5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .brand {
    text-align: center;
    margin-bottom: 20px;
  }

  .brand-logo {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #FF6B35, #4ECDC4);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    margin-bottom: 10px;
    box-shadow: 0 6px 20px rgba(255,107,53,.2);
  }

  .brand h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .brand h1 span { color: var(--admin); }

  .card {
    background: var(--card);
    backdrop-filter: blur(0px);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 24px 22px 28px;
    transition: all 0.2s ease;
    box-shadow: var(--shadow);
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: -0.2px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-row {
    display: flex;
    gap: 12px;
    margin-bottom: 0;
  }

  .form-row .form-group {
    flex: 1;
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .form-group input {
    width: 100%;
    padding: 11px 14px;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    transition: all 0.2s ease;
  }

  .form-group input:focus {
    outline: none;
    border-color: #FF6B35;
    background: #FFFFFF;
    box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
  }

  .form-group input::placeholder {
    color: #b0b3c5;
    font-weight: 400;
    font-size: 0.85rem;
  }

  .forgot-password {
    text-align: right;
    margin-top: -4px;
    margin-bottom: 20px;
  }

  .forgot-password a {
    color: var(--text-muted);
    font-size: 0.75rem;
    text-decoration: none;
    cursor: pointer;
    transition: color 0.2s;
  }

  .forgot-password a:hover {
    color: var(--admin);
  }

  .login-btn, .register-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(105deg, #FF6B35, #FF8C5A);
    border: none;
    border-radius: 40px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.3px;
    margin-top: 4px;
    box-shadow: 0 4px 14px rgba(255,107,53,0.25);
  }

  .login-btn:hover, .register-btn:hover {
    transform: translateY(-2px);
    filter: brightness(1.05);
    box-shadow: 0 8px 20px rgba(255,107,53,0.3);
  }

  .error-message, .success-message {
    border-radius: 16px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 0.8rem;
    text-align: center;
    display: none;
    font-weight: 500;
  }

  .error-message {
    background: rgba(255,70,70,0.1);
    border: 1px solid rgba(255,70,70,0.25);
    color: #e74c3c;
  }

  .success-message {
    background: rgba(78,205,196,0.1);
    border: 1px solid rgba(78,205,196,0.25);
    color: #27ae60;
  }

  .register-link, .back-to-login {
    text-align: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .register-link p, .back-to-login p {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .register-link a, .back-to-login a {
    color: var(--admin);
    text-decoration: none;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .register-link a:hover, .back-to-login a:hover {
    color: #FF8C5A;
    text-decoration: underline;
  }

  /* MODAL FORGOT PASSWORD */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
    z-index: 1100;
    align-items: center;
    justify-content: center;
  }

  .modal-content {
    background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 28px;
    padding: 28px 24px;
    max-width: 360px;
    width: 90%;
    animation: fadeUp 0.25s ease;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  }

  .modal-content h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    margin-bottom: 10px;
    color: var(--text);
  }

  .modal-content p {
    color: var(--text-muted);
    margin-bottom: 20px;
    font-size: 0.85rem;
  }

  .modal-content input {
    width: 100%;
    padding: 12px 14px;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    color: var(--text);
    margin-bottom: 24px;
    font-size: 0.9rem;
  }

  .modal-content input:focus {
    outline: none;
    border-color: #FF6B35;
  }

  .modal-buttons {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .modal-buttons button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .modal-buttons button:first-child {
    background: linear-gradient(105deg, #FF6B35, #FF8C5A);
    color: white;
  }

  .modal-buttons button:first-child:hover {
    transform: translateY(-2px);
    filter: brightness(1.05);
  }

  .modal-back-link {
    text-align: center;
    margin-top: 4px;
  }

  .modal-back-link a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.8rem;
    cursor: pointer;
    transition: color 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .modal-back-link a:hover {
    color: var(--admin);
  }

  /* basculement formulaires */
  .login-form-container {
    display: block;
  }

  .login-form-container.hide {
    display: none;
  }

  .register-form-container {
    display: none;
  }

  .register-form-container.active {
    display: block;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .wrapper {
      max-width: 100%;
    }
    .card {
      padding: 20px 18px;
    }
    .form-row {
      flex-direction: column;
      gap: 0;
    }
    .form-row .form-group {
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 1.1rem;
    }
    body {
      padding: 16px;
    }
  }

  input:-webkit-autofill,
  input:-webkit-autofill:focus {
    -webkit-text-fill-color: var(--text);
    background-color: var(--input-bg);
    transition: background-color 600000s 0s, color 600000s 0s;
  }
</style>
</head>
<body>
<div class="grid-overlay"></div>

<div class="wrapper">
  <div class="brand">
    <div class="brand-logo">🏢</div>
    <h1>STUDIA<span>AFRIQUE</span></h1>
  </div>

  <!-- FORMULAIRE DE CONNEXION -->
  <div id="loginFormContainer" class="login-form-container">
    <div class="card">
      <div class="card-title">🔐 CONNEXION</div>

      <div class="error-message" id="loginErrorMessage">
        ⚠️ Identifiants incorrects
      </div>
      <div class="success-message" id="loginSuccessMessage"></div>

      <div class="form-group">
        <label>👤 Nom / Email</label>
        <input type="text" id="loginNom" placeholder="Nom ou email" autocomplete="off">
      </div>

      <div class="form-group">
        <label>🔑 Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="Mot de passe" autocomplete="off">
      </div>

      <div class="forgot-password">
        <a id="forgotPasswordLink">Mot de passe oublié ?</a>
      </div>

      <button class="login-btn" id="loginBtn">Se connecter</button>

      <div class="register-link">
        <p>Pas encore inscrit ? <a id="showRegisterLink">Créer un compte</a></p>
      </div>
    </div>
  </div>

  <!-- FORMULAIRE D'INSCRIPTION -->
  <div id="registerFormContainer" class="register-form-container">
    <div class="card">
      <div class="card-title"> CRÉER UN COMPTE</div>

      <div class="error-message" id="registerErrorMessage"></div>
      <div class="success-message" id="registerSuccessMessage"></div>

      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" id="regFirstname" placeholder="Prénom" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" id="regLastname" placeholder="Nom" autocomplete="off">
        </div>
      </div>

      <div class="form-group">
        <label>📧 Email</label>
        <input type="email" id="regEmail" placeholder="exemple@studiaafrique.com" autocomplete="off">
      </div>

      <div class="form-group">
        <label>📱 Téléphone</label>
        <input type="tel" id="regPhone" placeholder="+216 XX XXX XXX" autocomplete="off">
      </div>

      <div class="form-group">
        <label>🔑 Mot de passe</label>
        <input type="password" id="regPassword" placeholder="Min. 6 caractères" autocomplete="off">
      </div>

      <div class="form-group">
        <label>✔️ Confirmer</label>
        <input type="password" id="regConfirmPassword" placeholder="Confirmez le mot de passe" autocomplete="off">
      </div>

      <button class="register-btn" id="registerBtn">S'inscrire</button>

      <div class="back-to-login">
        <p><a id="backToLoginLink">← Retour à la connexion</a></p>
      </div>
    </div>
  </div>
</div>

<!-- MODAL MOT DE PASSE OUBLIÉ -->
<div id="forgotModal" class="modal">
  <div class="modal-content">
    <h3>🔐 Réinitialisation</h3>
    <p>Entrez votre email pour recevoir un lien</p>
    <input type="email" id="resetEmail" placeholder="Votre adresse email">
    <div class="modal-buttons">
      <button id="sendResetLink">Envoyer l'email</button>
    </div>
    <div class="modal-back-link">
      <a id="modalBackToLogin">← Retour à la connexion</a>
    </div>
  </div>
</div>

<script>
  // ========== BASE DE DONNÉES UTILISATEURS ==========
  let defaultUsers = [
    { nom: 'admin', prenom: 'admin', role: 'admin', file: 'admin.html', displayRole: 'Administrateur', email: 'admin@studiaafrique.com', phone: '00000000', password: 'admin' },
    { nom: 'nada', prenom: 'nada', role: 'rh', file: 'rh.html', displayRole: 'Ressources Humaines', email: 'nada@studiaafrique.com', phone: '11111111', password: 'nada' },
    { nom: 'anas', prenom: 'anas', role: 'manager', file: 'manager.html', displayRole: 'Manager', email: 'anas@studiaafrique.com', phone: '22222222', password: 'anas' },
    { nom: 'messi', prenom: 'messi', role: 'employe', file: 'employe.html', displayRole: 'Employé', email: 'messi@studiaafrique.com', phone: '33333333', password: 'messi' }
  ];

  let users = [...defaultUsers];

  function loadUsersFromStorage() {
    const stored = localStorage.getItem('studia_users');
    if (stored) {
      const parsed = JSON.parse(stored);
      const existingSet = new Set(users.map(u => u.nom.toLowerCase()));
      for (let newUser of parsed) {
        if (!existingSet.has(newUser.nom.toLowerCase())) {
          users.push(newUser);
        }
      }
    }
    saveUsersToStorage();
  }

  function saveUsersToStorage() {
    localStorage.setItem('studia_users', JSON.stringify(users));
  }

  // ========== AFFICHAGE / MESSAGES ==========
  function showLoginError(msg) {
    const errDiv = document.getElementById('loginErrorMessage');
    errDiv.innerHTML = msg || '⚠️ Identifiants incorrects.';
    errDiv.style.display = 'block';
    setTimeout(() => { errDiv.style.opacity = '0'; setTimeout(() => { errDiv.style.display = 'none'; errDiv.style.opacity = '1'; }, 250); }, 2800);
  }
  
  function showRegisterError(msg) {
    const errDiv = document.getElementById('registerErrorMessage');
    errDiv.innerHTML = msg;
    errDiv.style.display = 'block';
    setTimeout(() => { errDiv.style.display = 'none'; }, 3000);
  }
  
  function showRegisterSuccess(msg) {
    const sucDiv = document.getElementById('registerSuccessMessage');
    sucDiv.innerHTML = msg;
    sucDiv.style.display = 'block';
    setTimeout(() => { sucDiv.style.display = 'none'; }, 3000);
  }
  
  function showLoginSuccessMessage(msg) {
    const sucDiv = document.getElementById('loginSuccessMessage');
    sucDiv.innerHTML = msg;
    sucDiv.style.display = 'block';
    setTimeout(() => { sucDiv.style.display = 'none'; }, 3500);
  }

  // ========== AUTHENTIFICATION ==========
  function authenticateUser(identifier, password) {
    const user = users.find(u => u.nom.toLowerCase() === identifier.toLowerCase() || u.email.toLowerCase() === identifier.toLowerCase());
    return (user && user.password === password) ? user : null;
  }

  function handleLogin() {
    const identifier = document.getElementById('loginNom').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if (!identifier || !password) {
      showLoginError('⚠️ Veuillez remplir tous les champs.');
      return;
    }
    const loginBtn = document.getElementById('loginBtn');
    const originalText = loginBtn.textContent;
    loginBtn.textContent = 'Connexion...';
    loginBtn.disabled = true;

    setTimeout(() => {
      const user = authenticateUser(identifier, password);
      if (user) {
        sessionStorage.setItem('user', JSON.stringify({
          nom: user.nom,
          prenom: user.prenom,
          role: user.role,
          displayRole: user.displayRole,
          email: user.email,
          loginTime: new Date().toISOString()
        }));
        window.location.href = user.file;
      } else {
        showLoginError('❌ Identifiants incorrects. Vérifiez vos informations.');
      }
      loginBtn.textContent = originalText;
      loginBtn.disabled = false;
    }, 400);
  }

  // ========== INSCRIPTION ==========
  function handleRegister() {
    const firstname = document.getElementById('regFirstname').value.trim();
    const lastname = document.getElementById('regLastname').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirmPwd = document.getElementById('regConfirmPassword').value;

    if (!firstname || !lastname || !email || !phone || !password) {
      showRegisterError('⚠️ Tous les champs sont obligatoires.');
      return;
    }
    if (password.length < 6) {
      showRegisterError('⚠️ Le mot de passe doit contenir au moins 6 caractères.');
      return;
    }
    if (password !== confirmPwd) {
      showRegisterError('⚠️ Les mots de passe ne correspondent pas.');
      return;
    }
    if (users.some(u => u.email.toLowerCase() === email.toLowerCase())) {
      showRegisterError('⚠️ Cet email est déjà utilisé.');
      return;
    }
    if (users.some(u => u.nom.toLowerCase() === lastname.toLowerCase())) {
      showRegisterError('⚠️ Ce nom d\'utilisateur existe déjà.');
      return;
    }

    const newUser = {
      nom: lastname,
      prenom: firstname,
      role: 'employe',
      file: 'employe.html',
      displayRole: 'Employé',
      email: email,
      phone: phone,
      password: password
    };
    users.push(newUser);
    saveUsersToStorage();

    showRegisterSuccess('✅ Compte créé avec succès !');
    
    document.getElementById('regFirstname').value = '';
    document.getElementById('regLastname').value = '';
    document.getElementById('regEmail').value = '';
    document.getElementById('regPhone').value = '';
    document.getElementById('regPassword').value = '';
    document.getElementById('regConfirmPassword').value = '';

    setTimeout(() => {
      showLoginForm();
      showLoginSuccessMessage('✨ Compte créé ! Connectez-vous.');
    }, 1600);
  }

  // ========== FORGOT PASSWORD ==========
  function showForgotPasswordModal() {
    const modal = document.getElementById('forgotModal');
    modal.style.display = 'flex';
    document.getElementById('resetEmail').value = '';
  }

  function sendResetLink() {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) {
      showModalTemporaryMessage('Veuillez entrer votre adresse email.', false);
      return;
    }
    const userExists = users.some(u => u.email.toLowerCase() === email.toLowerCase());
    if (userExists) {
      showModalTemporaryMessage(`✅ Un lien a été envoyé à ${email}.`, true);
    } else {
      showModalTemporaryMessage(`❌ Aucun compte associé à ${email}.`, false);
    }
    document.getElementById('resetEmail').value = '';
  }

  function showModalTemporaryMessage(message, isSuccess) {
    const modalContent = document.querySelector('#forgotModal .modal-content');
    const originalHTML = modalContent.innerHTML;
    modalContent.innerHTML = `
      <h3>${isSuccess ? '✅ Email envoyé' : '❌ Erreur'}</h3>
      <p style="margin-bottom: 28px;">${message}</p>
      <div class="modal-back-link" style="margin-top: 8px;">
        <a id="modalTempBack">← Retour à la connexion</a>
      </div>
    `;
    const backLink = document.getElementById('modalTempBack');
    if (backLink) {
      backLink.addEventListener('click', () => {
        document.getElementById('forgotModal').style.display = 'none';
        modalContent.innerHTML = originalHTML;
        reattachModalEvents();
      });
    }
    const modalBg = document.getElementById('forgotModal');
    const closeModalHandler = () => {
      document.getElementById('forgotModal').style.display = 'none';
      modalContent.innerHTML = originalHTML;
      reattachModalEvents();
      modalBg.removeEventListener('click', closeModalHandler);
    };
    modalBg.addEventListener('click', function onClickOutside(e) {
      if (e.target === modalBg) {
        closeModalHandler();
        modalBg.removeEventListener('click', onClickOutside);
      }
    });
  }

  function reattachModalEvents() {
    const sendBtn = document.getElementById('sendResetLink');
    const backLink = document.getElementById('modalBackToLogin');
    if (sendBtn) sendBtn.addEventListener('click', sendResetLink);
    if (backLink) backLink.addEventListener('click', () => {
      document.getElementById('forgotModal').style.display = 'none';
      showLoginForm();
    });
  }

  // ========== BASCULE FORMULAIRES ==========
  function showLoginForm() {
    document.getElementById('loginFormContainer').classList.remove('hide');
    document.getElementById('loginFormContainer').style.display = 'block';
    document.getElementById('registerFormContainer').classList.remove('active');
    document.getElementById('registerFormContainer').style.display = 'none';
    document.getElementById('loginErrorMessage').style.display = 'none';
    document.getElementById('registerErrorMessage').style.display = 'none';
  }

  function showRegisterForm() {
    document.getElementById('loginFormContainer').style.display = 'none';
    document.getElementById('loginFormContainer').classList.add('hide');
    document.getElementById('registerFormContainer').style.display = 'block';
    document.getElementById('registerFormContainer').classList.add('active');
    document.getElementById('registerErrorMessage').style.display = 'none';
    document.getElementById('registerSuccessMessage').style.display = 'none';
  }

  // ========== INITIALISATION ==========
  loadUsersFromStorage();

  document.getElementById('loginBtn').addEventListener('click', handleLogin);
  document.getElementById('showRegisterLink').addEventListener('click', (e) => { e.preventDefault(); showRegisterForm(); });
  document.getElementById('backToLoginLink').addEventListener('click', (e) => { e.preventDefault(); showLoginForm(); });
  document.getElementById('forgotPasswordLink').addEventListener('click', (e) => { e.preventDefault(); showForgotPasswordModal(); });
  document.getElementById('registerBtn').addEventListener('click', handleRegister);
  document.getElementById('sendResetLink').addEventListener('click', sendResetLink);
  document.getElementById('modalBackToLogin').addEventListener('click', () => {
    document.getElementById('forgotModal').style.display = 'none';
    showLoginForm();
  });

  window.addEventListener('click', (e) => {
    const modal = document.getElementById('forgotModal');
    if (e.target === modal) {
      modal.style.display = 'none';
    }
  });

  document.getElementById('loginNom').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
  document.getElementById('loginPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
  document.getElementById('regPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleRegister(); });
