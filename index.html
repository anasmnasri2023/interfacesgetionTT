<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDIAAFRIQUE — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --admin:  #FF6B35;
    --rh:     #4ECDC4;
    --manager:#45B7D1;
    --employe:#96CEB4;
    --bg:     #080b14;
    --card:   rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* animated background */
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,107,53,.13) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(78,205,196,.10) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(69,183,209,.06) 0%, transparent 70%);
    animation: bgPulse 8s ease-in-out infinite alternate;
    pointer-events:none;
  }
  @keyframes bgPulse {
    from { opacity:.7; }
    to   { opacity:1; }
  }

  .grid-overlay {
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:48px 48px;
    pointer-events:none;
  }

  .wrapper {
    position:relative; z-index:10;
    width:100%; max-width:480px;
    padding:24px;
    animation: fadeUp .6s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(32px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .brand {
    text-align:center;
    margin-bottom:40px;
  }
  .brand-logo {
    width:56px; height:56px;
    background:linear-gradient(135deg,#FF6B35,#4ECDC4);
    border-radius:16px;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:1.6rem; margin-bottom:16px;
    box-shadow:0 8px 32px rgba(255,107,53,.35);
  }
  .brand h1 {
    font-family:'Syne',sans-serif;
    font-size:2.2rem; font-weight:800; letter-spacing:-1px;
  }
  .brand h1 span { color:var(--admin); }
  .brand p { color:rgba(255,255,255,.4); font-size:.9rem; margin-top:6px; }

  .card {
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(24px);
    border:1px solid var(--border);
    border-radius:24px;
    padding:36px;
  }

  .card-title {
    font-family:'Syne',sans-serif;
    font-size:1.2rem; font-weight:700;
    color:rgba(255,255,255,.8);
    text-align:center;
    margin-bottom:28px;
  }

  .form-group {
    margin-bottom:24px;
  }

  .form-group label {
    display:block;
    margin-bottom:8px;
    font-size:0.85rem;
    font-weight:500;
    color:rgba(255,255,255,.6);
    letter-spacing:0.5px;
  }

  .form-group input {
    width:100%;
    padding:14px 16px;
    background:rgba(255,255,255,.05);
    border:2px solid rgba(255,255,255,.08);
    border-radius:12px;
    color:#fff;
    font-family:'DM Sans',sans-serif;
    font-size:1rem;
    transition:all .25s ease;
  }

  .form-group input:focus {
    outline:none;
    border-color:var(--border-focus, #FF6B35);
    background:rgba(255,255,255,.08);
  }

  .form-group input::placeholder {
    color:rgba(255,255,255,.3);
  }

  .login-btn {
    width:100%;
    padding:16px;
    background:linear-gradient(135deg, #FF6B35, #FF8C5A);
    border:none;
    border-radius:12px;
    color:#fff;
    font-family:'Syne',sans-serif;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    transition:all .3s;
    letter-spacing:.5px;
    box-shadow:0 4px 15px rgba(255,107,53,.3);
  }

  .login-btn:hover {
    transform:translateY(-2px);
    box-shadow:0 6px 20px rgba(255,107,53,.4);
  }

  .login-btn:active {
    transform:translateY(0);
  }

  .error-message {
    background:rgba(255,70,70,.2);
    border:1px solid rgba(255,70,70,.3);
    border-radius:12px;
    padding:12px;
    margin-bottom:20px;
    color:#ff6b6b;
    font-size:0.85rem;
    text-align:center;
    display:none;
  }

  .divider {
    text-align:center;
    color:rgba(255,255,255,.2);
    font-size:.78rem;
    margin-top:24px;
  }

  .demo-credentials {
    margin-top:20px;
    padding:12px;
    background:rgba(255,255,255,.03);
    border-radius:12px;
    font-size:0.75rem;
    color:rgba(255,255,255,.4);
    text-align:center;
  }

  .demo-credentials span {
    color:#FF6B35;
    font-weight:600;
  }

  .demo-credentials .role-badge {
    display:inline-block;
    margin:4px 6px;
    padding:2px 8px;
    border-radius:6px;
    font-size:0.7rem;
    font-weight:600;
  }

  .role-admin { color:#FF6B35; }
  .role-rh { color:#4ECDC4; }
  .role-manager { color:#45B7D1; }
  .role-employe { color:#96CEB4; }
</style>
</head>
<body>
<div class="grid-overlay"></div>

<div class="wrapper">
  <div class="brand">
    <div class="brand-logo">🏢</div>
    <h1>STUDIA<span>AFR</span></h1>
    <p>Système de Gestion des Ressources Humaines</p>
  </div>

  <div class="card">
    <div class="card-title">🔐 Accès sécurisé</div>

    <div class="error-message" id="errorMessage">
      ⚠️ Identifiants incorrects. Veuillez vérifier vos informations.
    </div>

    <div class="form-group">
      <label>👤 Nom</label>
      <input type="text" id="nom" placeholder="Votre nom" autocomplete="off">
    </div>

    <div class="form-group">
      <label>📧 Prénom / Email</label>
      <input type="text" id="prenom" placeholder="Votre prénom ou email" autocomplete="off">
    </div>

    <button class="login-btn" id="loginBtn">Se connecter</button>

    

    <div class="divider">Authentification sécurisée • STUDIAAFRIQUE v2.6</div>
  </div>
</div>

<script>
  // Base de données des utilisateurs avec leurs rôles respectifs
  const users = [
    { nom: 'admin', prenom: 'admin', role: 'admin', file: 'admin.html', displayRole: 'Administrateur' },
    { nom: 'nada', prenom: 'nada', role: 'rh', file: 'rh.html', displayRole: 'Ressources Humaines' },
    { nom: 'anas', prenom: 'anas', role: 'manager', file: 'manager.html', displayRole: 'Manager' },
    { nom: 'messi', prenom: 'messi', role: 'employe', file: 'employe.html', displayRole: 'Employé' }
  ];

  // Masquer le message d'erreur
  function hideError() {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.style.display = 'none';
  }

  // Afficher le message d'erreur
  function showError(message) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.innerHTML = message || '⚠️ Identifiants incorrects. Veuillez vérifier vos informations.';
    errorDiv.style.display = 'block';
    setTimeout(() => {
      errorDiv.style.opacity = '0';
      setTimeout(() => {
        errorDiv.style.display = 'none';
        errorDiv.style.opacity = '1';
        errorDiv.innerHTML = '⚠️ Identifiants incorrects. Veuillez vérifier vos informations.';
      }, 300);
    }, 3000);
  }

  // Vérifier les identifiants et retourner l'utilisateur correspondant
  function authenticateUser(nom, prenom) {
    return users.find(user => 
      user.nom.toLowerCase() === nom.toLowerCase() && 
      user.prenom.toLowerCase() === prenom.toLowerCase()
    );
  }

  // Gérer la connexion
  function handleLogin() {
    const nomInput = document.getElementById('nom');
    const prenomInput = document.getElementById('prenom');
    
    const nom = nomInput.value.trim();
    const prenom = prenomInput.value.trim();
    
    // Vérifier si tous les champs sont remplis
    if (!nom || !prenom) {
      showError('⚠️ Veuillez remplir tous les champs (Nom et Prénom/Email)');
      return;
    }
    
    // Authentifier l'utilisateur
    const user = authenticateUser(nom, prenom);
    
    if (user) {
      // Stocker les informations de l'utilisateur dans sessionStorage
      sessionStorage.setItem('user', JSON.stringify({
        nom: user.nom,
        prenom: user.prenom,
        role: user.role,
        displayRole: user.displayRole,
        email: `${user.prenom}@studiaafrique.com`,
        loginTime: new Date().toISOString()
      }));
      
      // Redirection vers la page correspondante
      window.location.href = user.file;
    } else {
      // Message d'erreur personnalisé selon le rôle essayé
      const lowerNom = nom.toLowerCase();
      const lowerPrenom = prenom.toLowerCase();
      
      // Vérifier si le nom existe mais avec un mauvais prénom
      const userByNom = users.find(u => u.nom.toLowerCase() === lowerNom);
      if (userByNom) {
        showError(`⚠️ "Prénom" incorrect pour ${userByNom.displayRole}. Vérifiez vos identifiants.`);
      } else {
        const userByPrenom = users.find(u => u.prenom.toLowerCase() === lowerPrenom);
        if (userByPrenom) {
          showError(`⚠️ "Nom" incorrect pour ${userByPrenom.displayRole}. Vérifiez vos identifiants.`);
        } else {
          showError('⚠️ Identifiants non reconnus. Veuillez utiliser les comptes de démonstration.');
        }
      }
    }
  }

  // Ajouter l'événement de connexion
  document.getElementById('loginBtn').addEventListener('click', handleLogin);

  // Ajouter l'événement Enter sur les champs
  document.getElementById('nom').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
  
  document.getElementById('prenom').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
